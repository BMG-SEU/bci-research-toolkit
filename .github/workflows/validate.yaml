name: Validate Workflows

on:
  push:
    paths:
      - 'workflows/**/*.yaml'
  pull_request:
    paths:
      - 'workflows/**/*.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install agency-orchestrator
        run: npm install -g agency-orchestrator

      - name: Validate all YAML workflows
        run: |
          for f in workflows/*.yaml; do
            echo "=== Validating $f ==="
            ao validate "$f" || exit 1
          done
          echo "✅ All workflows valid"
